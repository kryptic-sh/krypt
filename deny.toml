# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# Relaxed from "deny" while krypt-core's gix-* deps come from the
# mxaddict/gitoxide fork via git URL (no version field). Restore to
# "deny" once upstream gitoxide PR #2603 merges and we switch back
# to crates.io.
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Temporary: gix-stash plumbing lives on a personal fork until upstream
# gitoxide PR #2603 lands. Remove this entry when krypt-core switches
# its gix dep back to crates.io.
allow-git = ["https://github.com/mxaddict/gitoxide"]
